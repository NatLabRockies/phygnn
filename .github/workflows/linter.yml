name: Lint Code Base

on:
  push:
    branches-ignore:
      - 'gh-pages'
  pull_request:
    branches: [main]

jobs:
  ruff:
    name: Lint Code Base
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/ruff-action@v3
        with:
          version: "latest"
          args: check --output-format=github
          src: "./phygnn ./tests"
